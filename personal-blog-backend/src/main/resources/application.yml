server:
  port: 8080

spring:
  security:
    jwt:
      secret: YourSecretKeyForJWTGenerationAndValidation1234567890
      expiration: 43200
      remember-me-expiration: 604800
  servlet:
    multipart:
      max-file-size: 5MB
      max-request-size: 6MB
  profiles:
    active: local

management:
  endpoints:
    web:
      exposure:
        include: health,metrics
  endpoint:
    health:
      show-details: when_authorized

mybatis-plus:
  mapper-locations: classpath:/mapper/*.xml # Mapper XML 
  global-config:
    db-config:
      id-type: auto 
      logic-delete-field: deleted 
      logic-not-delete-value: 0
      logic-delete-value: 1
      table-underline: true 
  configuration:
    map-underscore-to-camel-case: true 

blog:
  site-url: http://localhost:5173
  site-base-path: ""
  site-title: 晓晓博客
  site-description: 个人博客与技术笔记
  notify-mail-enabled: false
  notify-from: ""
  stream:
    enabled: true
    stream-key: blog:events
    dead-stream-key: blog:events:dead
    consumer-group: blog-consumer-group
    consumer-name: blog-dispatcher-1
    max-retries: 3
    retry-backoff-ms: 10000
    max-stream-length: 1000

app:
  upload-dir: upload