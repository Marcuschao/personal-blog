server:
  port: 8080 # ??????

spring:
  security:
    jwt:
      secret: YourSecretKeyForJWTGenerationAndValidation1234567890
      expiration: 43200
      remember-me-expiration: 604800
  servlet:
    multipart:
      max-file-size: 5MB
      max-request-size: 6MB
  profiles:
    active: local
  # 生产部署请将 SPRING_PROFILES_ACTIVE 设为 dev

management:
  endpoints:
    web:
      exposure:
        include: health,metrics
  endpoint:
    health:
      show-details: when_authorized

mybatis-plus:
  mapper-locations: classpath:/mapper/*.xml # Mapper XML ????
  global-config:
    db-config:
      id-type: auto # ??????????????
      logic-delete-field: deleted # ??????
      logic-not-delete-value: 0
      logic-delete-value: 1
      table-underline: true # ???????????????
  configuration:
    map-underscore-to-camel-case: true # ???????????????

blog:
  site-url: http://localhost:5173
  site-title: 晓晓博客
  site-description: 个人博客与技术笔记
  notify-mail-enabled: false
  notify-from: ""

app:
  upload-dir: upload

logging:
  level:
    com.blog: DEBUG # ??????
    org.springframework.web: INFO
    org.mybatis.spring: DEBUG
    org.springframework.security: DEBUG
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss, Asia/Shanghai} - %logger{36} - %msg%n" # ??????